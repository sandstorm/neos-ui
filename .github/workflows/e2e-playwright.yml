name: E2E Tests Playwright
on:
  workflow_dispatch:
  push:
    branches: [ '[0-9]+.[0-9]' ]
  pull_request:
    branches: [ '[0-9]+.[0-9]' ]

jobs:
  test:
    name: "Playwright Browser Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node (repo root, for `make build`)
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache-dependency-path: 'yarn.lock'
          cache: 'yarn'

      - name: Install root npm dependencies
        run: make install

      - name: Build JS bundle (frontendDevelopmentMode reads from Resources/Public/Build)
        run: make build

      - name: Setup Node (Tests/E2E, for Playwright + playwright-bdd)
        uses: actions/setup-node@v6
        with:
          node-version-file: 'Tests/E2E/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'Tests/E2E/package-lock.json'

      - name: Install Tests/E2E dependencies
        working-directory: Tests/E2E
        run: npm ci

      - name: Install Playwright browsers
        working-directory: Tests/E2E
        run: npx playwright install --with-deps

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pre-build SUT Docker image (with persistent layer cache)
        # Builds the SUT image once and persists layers in GitHub's
        # actions cache (`type=gha`). Subsequent runs restore layers
        # from the cache, dropping the build from ~3 min to ~30-60s
        # whenever the Dockerfile and overrides have not changed.
        # `load: true` exposes the tagged image to the local Docker
        # daemon so `docker compose up` (in the Playwright webServer
        # step) finds it without rebuilding.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Tests/E2E/system_under_test/Dockerfile
          tags: neos-ui-e2e-sut:9.0
          load: true
          cache-from: type=gha,scope=sut
          cache-to: type=gha,mode=max,scope=sut

      - name: Map test site hostnames to localhost
        # Ubuntu's stub resolver does not handle *.localhost subdomains; the
        # switching-sites scenarios need both hostnames to reach the SUT sites.
        run: |
          echo "127.0.0.1 onedimension.localhost" | sudo tee -a /etc/hosts
          echo "127.0.0.1 twodimensions.localhost" | sudo tee -a /etc/hosts

      - name: Run Playwright tests
        working-directory: Tests/E2E
        run: npm run test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: playwright-report
          path: Tests/E2E/playwright-report/
          retention-days: 30

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: playwright-test-results
          path: Tests/E2E/test-results/
          retention-days: 30

      - name: Show SUT container logs on failure
        if: ${{ failure() }}
        run: |
          docker compose -f Tests/E2E/system_under_test/docker-compose.yaml logs --no-color
