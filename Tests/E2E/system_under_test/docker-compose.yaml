services:
  neos:
    user: www-data:www-data
    build:
      context: ../../../
      dockerfile: Tests/E2E/system_under_test/Dockerfile
      args:
        # minimum PHP version is '8.2' because that's the lowest version frankenPHP provides an image for.
        # Reasoning: If it runs with PHP 8.2, it will also run with higher versions.
        PHP_VERSION: '8.2'
        # used to install the system under test
        # which is a neos-base-distribution:^${NEOS_VERSION}
        NEOS_VERSION: '9'
    environment:
      FLOW_CONTEXT: "${FLOW_CONTEXT:-Production/E2E-SUT}"
      # DB connection
      DB_NEOS_HOST: 'db'
      DB_NEOS_PORT: 3306
      DB_NEOS_USER: 'neos'
      DB_NEOS_PASSWORD: 'neos'
      DB_NEOS_DATABASE: 'neos'
      # Redis connection
      REDIS_HOST: 'redis'
      REDIS_PORT: 6379
      # this is safe because the neos container port is only exposed to the local interface.
      FLOW_HTTP_TRUSTED_PROXIES: '*'
    volumes:
      - ../../../Classes:/neos-ui/Classes:cached
      - ../../../Configuration:/neos-ui/Configuration:cached
      - ../../../Migrations:/neos-ui/Migrations:cached
      - ../../../Resources:/neos-ui/Resources:cached
      - ../../../composer.json:/neos-ui/composer.json:cached
      - composer_cache:/composer_cache
    networks:
      - neos_SUT
    ports:
      - 8081:8081
    depends_on:
      - db
      - redis

  db:
    image: mariadb:11.4
    restart: always
    ports:
      - "13306:3306"
    networks:
      - neos_SUT
    environment:
      MARIADB_RANDOM_ROOT_PASSWORD: 'true'
      MARIADB_DATABASE: 'neos'
      MARIADB_USER: 'neos'
      MARIADB_PASSWORD: 'neos'
      MARIADB_AUTO_UPGRADE: 1
    volumes:
      - db_neos_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7
    restart: always
    networks:
      - neos_SUT

volumes:
  db_neos_data:
    name: neos_ui_e2e_db_neos_data
  composer_cache:

networks:
  neos_SUT:
    name: neos_SUT
