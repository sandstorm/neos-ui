Neos:
  Flow:
    persistence:
      backendOptions:
        driver: 'pdo_mysql'
        charset: 'utf8mb4'
        host: '%env:DB_NEOS_HOST%'
        port: '%env:DB_NEOS_PORT%'
        password: '%env:DB_NEOS_PASSWORD%'
        user: '%env:DB_NEOS_USER%'
        dbname: '%env:DB_NEOS_DATABASE%'
    cache:
      applicationIdentifier: 'app'
    reflection:
      ignoredTags:
        template: true
        psalm: true
  Neos:
    Ui:
      frontendDevelopmentMode: true

  Imagine:
    driver: Gd
